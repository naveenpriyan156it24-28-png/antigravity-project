<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="VoxLingua Multilingual Audio Dashboard" />
    <title>VoxLingua - Multilingual Audio Dashboard</title>
    
    <!-- Preconnect & Inter Font load with display=swap -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    
    <script>
      // Font watchdog timer: default to 'Inter', fallback to system sans-serif if not loaded in 1.5s
      document.documentElement.style.setProperty('--font-family', "'Inter'");
      
      const fontWatchdog = setTimeout(() => {
        console.warn("Inter font load timed out (1.5s). Falling back to system sans-serif.");
        document.documentElement.style.setProperty('--font-family', 'system-ui, sans-serif');
        document.documentElement.classList.add('font-fallback-active');
      }, 1500);

      if ('fonts' in document) {
        document.fonts.load('1em Inter').then(() => {
          clearTimeout(fontWatchdog);
          console.log("Inter font successfully loaded.");
        }).catch((err) => {
          console.error("Font loading detection error: ", err);
        });
      }
    </script>
    <script type="module" crossorigin src="/assets/index-ByS7SGpd.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DXFgNGAJ.css">
  </head>
  <body class="bg-bg-surface text-text-primary antialiased min-h-screen">
    <div id="root"></div>
  </body>
</html>
